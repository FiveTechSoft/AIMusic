<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AI Music — FiveTech</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background:#111; color:#eee; font-family:Segoe UI, Arial, sans-serif; margin:0; padding:20px; }
  h1 { text-align:center; font-weight:300; letter-spacing:2px; }
  .wrap { max-width:900px; margin:0 auto; }
  video { width:100%; background:#000; border-radius:6px; }
  ul { list-style:none; padding:0; margin:20px 0; }
  li { padding:10px 14px; cursor:pointer; border-bottom:1px solid #333; transition:background .15s; }
  li:hover { background:#222; }
  li.active { background:#2a2a2a; color:#ffcc00; border-left:3px solid #ffcc00; padding-left:11px; }
  footer { text-align:center; color:#666; font-size:12px; margin-top:30px; }
  footer a { color:#888; text-decoration:none; }
</style>
</head>
<body>

<div class="wrap">
  <h1>AI Music Playlist</h1>
  <video id="player" controls autoplay playsinline></video>
  <ul id="list"></ul>
  <footer>
    Generated music tracks &middot;
    <a href="https://github.com/FiveTechSoft/AIMusic">github.com/FiveTechSoft/AIMusic</a>
  </footer>
</div>

<script>
const tracks = [
  "Moonlit Ivy Ladder.mp4",
  "Moonlit Cipher.mp4",
  "Celestial Twelve.mp4",
  "Lune Sur Verre.mp4"
];
const player = document.getElementById('player');
const list   = document.getElementById('list');
let current  = 0;

function load(i) {
  current = i;
  player.src = encodeURI(tracks[i]);
  player.play().catch(() => {});
  document.querySelectorAll('#list li').forEach((el, idx) =>
    el.classList.toggle('active', idx === i));
}

tracks.forEach((t, i) => {
  const li = document.createElement('li');
  li.textContent = (i + 1) + '. ' + t.replace('.mp4', '');
  li.onclick = () => load(i);
  list.appendChild(li);
});

player.addEventListener('ended', () => load((current + 1) % tracks.length));
load(0);
</script>

</body>
</html>
